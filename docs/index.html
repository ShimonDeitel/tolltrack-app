<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tolltrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body { margin:0; background:#1D1211; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
h1 { font-size:2.4rem; margin-bottom:0.2em; color:#C1443C; }
.tagline { font-size:1.1rem; color:#ccc; margin-bottom:2em; }
p { line-height:1.6; color:#ddd; }
a { color:#C1443C; }
.cta { display:inline-block; margin-top:2em; padding:14px 28px; background:#C1443C; color:#111; border-radius:10px; text-decoration:none; font-weight:600; }
footer { margin-top:4em; font-size:0.85rem; color:#888; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #C1443C55 0%, #C1443C00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Tolltrack</h1>
  <div class="tagline">Toll Road Log</div>
  <p>Log toll road charges to see what commuting really costs.</p>
  <p>Log toll amount, route, and date. Upgrade to Pro for: Monthly route cost comparison and mileage cost projection.</p>
  <a class="cta" href="#">Download on the App Store</a>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
